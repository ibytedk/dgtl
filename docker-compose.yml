services:
  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: mysql://dgtl:dgtl@mysql:3306/dgtl_dk
      NEXTAUTH_SECRET: change-this-before-production
      NEXTAUTH_URL: http://localhost:3000
      S3_ENDPOINT: http://minio:9000
      S3_REGION: eu-north-1
      S3_BUCKET: dgtl-assets
      S3_ACCESS_KEY_ID: dgtl
      S3_SECRET_ACCESS_KEY: change-this-minio-secret
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: dgtl_dk
      MYSQL_USER: dgtl
      MYSQL_PASSWORD: dgtl
      MYSQL_ROOT_PASSWORD: dgtl-root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u dgtl -pdgtl"]
      interval: 10s
      timeout: 5s
      retries: 8

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dgtl
      MINIO_ROOT_PASSWORD: change-this-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  minio-data:
